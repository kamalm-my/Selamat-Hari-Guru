<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Hari Guru</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
    font-family:'Poppins',sans-serif;
    position:relative;
    padding:20px;
}

/* fireworks */
canvas{
    position:absolute;
    inset:0;
    z-index:0;
}

.card{
    width:100%;
    max-width:850px;
    padding:45px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    z-index:2;
    text-align:center;
}

.title{
    font-size:3rem;
    color:white;
    margin-bottom:25px;
    font-weight:700;
    text-shadow:0 0 25px rgba(255,255,255,0.5);
}

#text{
    color:#f8fafc;
    font-size:1.25rem;
    line-height:2.2rem;
    white-space:pre-wrap;
    word-break:break-word;
}

.cursor{
    display:inline-block;
    animation:blink .7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.highlight{
    color:#fde68a;
    font-weight:600;
}

.footer{
    margin-top:30px;
    color:#cbd5e1;
    letter-spacing:2px;
    font-size:0.95rem;
}

/* =========================
   MOBILE VIEW
========================= */

@media(max-width:768px){

    body{
        padding:15px;
        align-items:center;
    }

    .card{
        padding:25px 20px;
        border-radius:25px;
    }

    .title{
        font-size:2rem;
        line-height:2.5rem;
        margin-bottom:20px;
    }

    #text{
        font-size:1rem;
        line-height:1.9rem;
    }

    .footer{
        margin-top:20px;
        font-size:0.8rem;
        letter-spacing:1px;
    }
}

/* extra small phone */

@media(max-width:480px){

    .title{
        font-size:1.6rem;
    }

    #text{
        font-size:0.95rem;
        line-height:1.7rem;
    }

    .card{
        padding:22px 18px;
    }
}

</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">

    <div class="title">
        Selamat Hari Guru ✨
    </div>

    <div id="text"></div>

    <div class="footer">
        SMK Dato' Penggawa Barat
    </div>

</div>

<script>

/* =========================
   TYPEWRITER
========================= */

const message = `Guru bukan hanya mengajar…

kadang mereka jadi tempat seorang anak belajar tentang hidup, sabar dan harapan.

Kita mungkin lupa apa yang diajar,

tapi kita tak pernah lupa cara seorang guru membuat kita rasa mampu.

Terima kasih cikgu.`;

const textElement = document.getElementById("text");

let index = 0;

function typeWriter(){

    if(index < message.length){

        let currentText = message.substring(0,index+1);

        currentText = currentText.replace(
            "Terima kasih cikgu.",
            '<span class="highlight">Terima kasih cikgu.</span>'
        );

        textElement.innerHTML =
        currentText + '<span class="cursor">|</span>';

        index++;

        setTimeout(typeWriter,45);

    }else{

        textElement.innerHTML =
        message.replace(
            "Terima kasih cikgu.",
            '<span class="highlight">Terima kasih cikgu.</span>'
        );

    }
}

typeWriter();


/* =========================
   FIREWORKS
========================= */

const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();

let particles = [];

class Particle{

    constructor(x,y,color){

        this.x = x;
        this.y = y;
        this.color = color;

        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 5 + 1;

        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;

        this.alpha = 1;
        this.size = Math.random() * 3 + 1;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.vy += 0.02;

        this.alpha -= 0.01;
    }

    draw(){

        ctx.globalAlpha = this.alpha;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

function createFirework(){

    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height * 0.6;

    const colors = [
        '#ff4d6d',
        '#ffd60a',
        '#4cc9f0',
        '#c77dff',
        '#ffffff',
        '#80ed99'
    ];

    const color = colors[Math.floor(Math.random()*colors.length)];

    const particleCount =
        window.innerWidth < 768 ? 40 : 80;

    for(let i=0;i<particleCount;i++){

        particles.push(
            new Particle(x,y,color)
        );
    }
}

function animate(){

    ctx.fillStyle = 'rgba(2,6,23,0.2)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((particle,index)=>{

        particle.update();
        particle.draw();

        if(particle.alpha <= 0){

            particles.splice(index,1);
        }
    });

    requestAnimationFrame(animate);
}

animate();

setInterval(createFirework,1000);

window.addEventListener('resize',resizeCanvas);

</script>

</body>
</html>
